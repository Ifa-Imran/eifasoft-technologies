services:
  postgres:
    image: postgres:14-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: kairo_admin
      POSTGRES_PASSWORD: K41r0D3v2024!
      POSTGRES_DB: kairo_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - kairo_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kairo_admin -d kairo_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass K41r0R3d1s! --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - kairo_network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "K41r0R3d1s!", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: node:18-alpine
    restart: unless-stopped
    working_dir: /app
    command: >
      sh -c "
        apk add --no-cache git &&
        rm -rf /tmp/repo &&
        git clone https://github.com/Ifa-Imran/eifasoft-technologies.git /tmp/repo &&
        cp -a /tmp/repo/backend/. /app/ &&
        NODE_ENV=development npm ci &&
        npx tsc &&
        mkdir -p dist/db/migrations && cp src/db/migrations/*.sql dist/db/migrations/ &&
        node dist/db/migrate.js &&
        NODE_ENV=production node dist/index.js
      "
    environment:
      - PORT=4000
      - DATABASE_URL=postgresql://kairo_admin:K41r0D3v2024!@postgres:5432/kairo_dev
      - REDIS_URL=redis://:K41r0R3d1s!@redis:6379
      - RPC_URL=https://opbnb-mainnet-rpc.bnbchain.org
      - RPC_WS_URL=wss://opbnb-mainnet-rpc.bnbchain.org
      - CHAIN_ID=204
      - KAIRO_TOKEN_ADDRESS=0xE6eab343b44B1D1Ccd8fFbf545a6e3e2425c7a18
      - LIQUIDITY_POOL_ADDRESS=0x611B2c50E0BCcC99E5632c569431C39983126287
      - STAKING_MANAGER_ADDRESS=0xeFc8271Abe8a1EADd5c4D7c9903C0D092C2bEF86
      - AFFILIATE_DISTRIBUTOR_ADDRESS=0xB77Fce4e84E4F7eaE24FD5090Bce2BbD259756fF
      - CMS_ADDRESS=0xf49B943C61F6D72C58Bc52d526d5F649f76670C9
      - ATOMIC_P2P_ADDRESS=0x995B0545677150d8d5Fa6374730FcB4cD400ba88
      - SYSTEM_WALLET=0x624D0985D844Cd1DF132723a9d849FE1A34cAf9D
      - DEPLOYMENT_BLOCK=135425000
    volumes:
      - backend_app:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - kairo_network
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=kairo-dev_kairo_network"
      - "traefik.http.routers.kairodao-api.rule=Host(`kairodao.com`) && PathPrefix(`/api`)"
      - "traefik.http.routers.kairodao-api.entrypoints=websecure"
      - "traefik.http.routers.kairodao-api.tls.certresolver=letsencrypt"
      - "traefik.http.routers.kairodao-api.service=kairodao-backend"
      - "traefik.http.routers.kairodao-ws.rule=Host(`kairodao.com`) && PathPrefix(`/ws`)"
      - "traefik.http.routers.kairodao-ws.entrypoints=websecure"
      - "traefik.http.routers.kairodao-ws.tls.certresolver=letsencrypt"
      - "traefik.http.routers.kairodao-ws.service=kairodao-backend"
      - "traefik.http.routers.kairodao-health.rule=Host(`kairodao.com`) && PathPrefix(`/health`)"
      - "traefik.http.routers.kairodao-health.entrypoints=websecure"
      - "traefik.http.routers.kairodao-health.tls.certresolver=letsencrypt"
      - "traefik.http.routers.kairodao-health.service=kairodao-backend"
      - "traefik.http.services.kairodao-backend.loadbalancer.server.port=4000"

  frontend:
    image: node:18-alpine
    restart: unless-stopped
    working_dir: /app
    command: >
      sh -c "
        apk add --no-cache git &&
        rm -rf /tmp/repo &&
        git clone https://github.com/Ifa-Imran/eifasoft-technologies.git /tmp/repo &&
        cp -a /tmp/repo/frontend/. /app/ &&
        npm ci --legacy-peer-deps &&
        NEXT_PUBLIC_BACKEND_URL=https://kairodao.com
        NEXT_PUBLIC_WS_URL=wss://kairodao.com/ws
        NEXT_PUBLIC_CHAIN_ID=204
        NEXT_PUBLIC_KAIRO_TOKEN=0xE6eab343b44B1D1Ccd8fFbf545a6e3e2425c7a18
        NEXT_PUBLIC_LIQUIDITY_POOL=0x611B2c50E0BCcC99E5632c569431C39983126287
        NEXT_PUBLIC_STAKING_MANAGER=0xeFc8271Abe8a1EADd5c4D7c9903C0D092C2bEF86
        NEXT_PUBLIC_AFFILIATE_DISTRIBUTOR=0xB77Fce4e84E4F7eaE24FD5090Bce2BbD259756fF
        NEXT_PUBLIC_CMS=0xf49B943C61F6D72C58Bc52d526d5F649f76670C9
        NEXT_PUBLIC_ATOMIC_P2P=0x995B0545677150d8d5Fa6374730FcB4cD400ba88
        NEXT_PUBLIC_USDT=0x9e5AAC1Ba1a2e6aEd6b32689DFcF62A509Ca96f3
        NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID=d9fddb48789291a159e8270ef32105c2
        NEXT_PUBLIC_SYSTEM_WALLET=0x624D0985D844Cd1DF132723a9d849FE1A34cAf9D
        npm run build &&
        cp -r .next/static .next/standalone/.next/static &&
        cp -r public .next/standalone/public &&
        NODE_ENV=production node .next/standalone/server.js
      "
    volumes:
      - frontend_app:/app
    depends_on:
      - backend
    networks:
      - kairo_network
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=kairo-dev_kairo_network"
      - "traefik.http.routers.kairodao-frontend.rule=Host(`kairodao.com`) || Host(`www.kairodao.com`)"
      - "traefik.http.routers.kairodao-frontend.entrypoints=websecure"
      - "traefik.http.routers.kairodao-frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.kairodao-frontend.loadbalancer.server.port=3000"
      - "traefik.http.routers.kairodao-frontend.priority=1"

  traefik:
    image: traefik:latest
    restart: unless-stopped
    command:
      - "--api.insecure=false"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=kairo-dev_kairo_network"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.letsencrypt.acme.email=admin@kairodao.com"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt:/letsencrypt
    networks:
      - kairo_network

volumes:
  postgres_data:
  redis_data:
  backend_app:
  frontend_app:
  letsencrypt:

networks:
  kairo_network:
    driver: bridge
